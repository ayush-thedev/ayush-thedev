name: Tic Tac Toe Game

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'ttc|')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Process Move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/play.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add board_state.json README.md
          git commit -m "Update Tic-Tac-Toe Board" || exit 0
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Move processed successfully! Check the README for the updated board."
